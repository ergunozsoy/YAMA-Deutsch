name: Deploy YAMA-Deutsch to Pages

# Bei jedem Push auf main automatisch bauen und veröffentlichen.
on:
  push:
    branches: [main]
  workflow_dispatch:        # erlaubt manuelles Auslösen über den Actions-Tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 06_App_Code     # hier liegt das Vite-Projekt
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: 06_App_Code/package-lock.json

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Bauen (tsc && vite build -> dist/)
        run: npm run build

      - name: Pages konfigurieren
        uses: actions/configure-pages@v5

      - name: Artefakt hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: 06_App_Code/dist           # Pfad ist relativ zum Repo-Wurzel

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Auf Pages veröffentlichen
        id: deployment
        uses: actions/deploy-pages@v4
